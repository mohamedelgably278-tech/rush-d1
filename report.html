<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>تقرير عقاري احترافي</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{--ink:#241241;--plum:#6A45C9;--ps:#EFEAFB;--lime:#AEDD1C;--ld:#51730A;--ls:#EEF7D6;--coral:#DD4F36;--cs:#FBE6E0;--amber:#DD8E2A;--as:#FAEFD8;--paper:#FBF8F3;--card:#fff;--soft:#6A6380;--line:#ECE5DB}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}
h1,h2,h3{font-family:'El Messiri',serif}

/* LOADING */
.loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.spinner{width:52px;height:52px;border:4px solid var(--ps);border-top-color:var(--plum);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{font-size:15px;font-weight:700;color:var(--soft)}

/* ERROR */
.error-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
.error-card{background:var(--card);border-radius:22px;padding:40px 32px;max-width:420px;box-shadow:0 4px 32px rgba(36,18,65,.1)}
.error-card h2{font-size:22px;margin-bottom:10px}
.error-card p{color:var(--soft);font-size:14.5px;line-height:1.75}

/* REPORT WRAPPER */
.report{max-width:820px;margin:0 auto;padding:0 0 60px}

/* HEADER */
.rpt-header{background:linear-gradient(150deg,var(--ink),#3a1d7a);color:#fff;padding:28px 28px 24px;position:relative;overflow:hidden}
.rpt-header::before{content:"";position:absolute;top:-80px;right:-60px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(174,221,28,.12),transparent 60%)}
.rpt-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative}
.rpt-logo{display:flex;align-items:center;gap:8px;font-family:'El Messiri';font-weight:700;font-size:18px;color:#fff}
.rpt-broker{text-align:left;font-size:12px;color:rgba(255,255,255,.7);font-weight:600;line-height:1.6}
.rpt-broker b{color:rgba(255,255,255,.95);font-size:13px}
.rpt-title{font-size:22px;color:#fff;position:relative;margin-bottom:4px}
.rpt-sub{font-size:13px;color:rgba(255,255,255,.7);font-weight:600;position:relative}

/* VERDICT */
.verdict{margin:0 20px;transform:translateY(-16px)}
.verdict-box{border-radius:14px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.verdict-text{font-family:'El Messiri';font-weight:700;font-size:18px;color:#fff}
.verdict-badge{font-size:11px;font-weight:800;padding:4px 12px;border-radius:100px;background:rgba(255,255,255,.2);color:#fff}

/* BODY */
.rpt-body{padding:0 20px}

/* SCORE SECTION */
.score-section{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:16px;box-shadow:0 2px 10px rgba(36,18,65,.06)}
.score-row{display:flex;align-items:center;gap:20px}
.score-gauge{flex-shrink:0}
.score-num{font-family:'El Messiri';font-weight:700;font-size:52px;line-height:1;margin-bottom:4px}
.score-label{font-size:12px;font-weight:700;color:var(--soft)}
.score-bars{flex:1;display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{font-size:12.5px;font-weight:700;color:var(--soft);width:90px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:8px;background:var(--paper);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width 1s ease}
.bar-val{font-size:11.5px;font-weight:800;width:32px;text-align:left;flex-shrink:0;color:var(--ink)}

/* DEAL SECTION */
.sec{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(36,18,65,.06)}
.sec-title{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.deal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.deal-item{background:var(--paper);border-radius:10px;padding:11px 13px}
.deal-item .dl{font-size:11px;color:var(--soft);font-weight:700;margin-bottom:3px}
.deal-item .dv{font-size:14.5px;font-weight:800}
.deal-item.highlight .dv{color:var(--plum)}

/* ANALYSIS */
.analysis-text{font-size:14.5px;line-height:1.85;color:var(--ink);font-weight:500}

/* CHECKLIST */
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-radius:11px}
.check-ok{background:var(--ls);border:1px solid rgba(81,115,10,.2)}
.check-warn{background:var(--as);border:1px solid rgba(221,142,42,.2)}
.check-bad{background:var(--cs);border:1px solid rgba(221,79,54,.2)}
.check-icon{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:2px}
.ci-ok{background:var(--ld);color:#fff}.ci-warn{background:var(--amber);color:#fff}.ci-bad{background:var(--coral);color:#fff}
.check-title{font-weight:700;font-size:13.5px;margin-bottom:2px}
.check-detail{font-size:12.5px;color:var(--soft);font-weight:500;line-height:1.6}

/* RETURNS */
.returns-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.ret-box{background:var(--paper);border-radius:12px;padding:14px;text-align:center}
.ret-box .rv{font-family:'El Messiri';font-weight:700;font-size:22px;margin-bottom:4px}
.ret-box .rl{font-size:11px;font-weight:700;color:var(--soft)}

/* COMPARISON TABLE */
.comp-table{width:100%;border-collapse:collapse}
.comp-table th{background:var(--ink);color:#fff;padding:11px 13px;font-size:12.5px;font-weight:700;text-align:right}
.comp-table td{padding:11px 13px;font-size:13.5px;font-weight:600;border-bottom:1px dashed var(--line);text-align:right}
.comp-table tr:last-child td{border-bottom:none}
.comp-table tr:nth-child(even) td{background:var(--paper)}
.col-a{background:rgba(106,69,201,.04)!important}
.col-b{background:rgba(221,142,42,.04)!important}

/* PHOTOS */
.photos-grid{display:flex;gap:10px}
.photo-item{flex:1;aspect-ratio:4/3;border-radius:12px;overflow:hidden;background:var(--paper)}
.photo-item img{width:100%;height:100%;object-fit:cover}
.photo-placeholder{width:100%;height:100%;display:grid;place-items:center;font-size:24px;color:var(--soft)}

/* FOOTER */
.rpt-footer{margin:24px 20px 0;padding:16px 0;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.rpt-footer .fl{font-size:12px;color:var(--soft);font-weight:600}
.wa-btn{background:#25D366;color:#fff;font-family:'Tajawal';font-weight:800;font-size:14px;padding:11px 20px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s}
.wa-btn:hover{background:#1fba58}

/* COMPARE HEADERS */
.comp-unit-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.unit-badge{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-family:'El Messiri';font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.unit-name{font-weight:700;font-size:16px}
.unit-dev{font-size:12.5px;color:var(--soft);font-weight:600;margin-top:2px}

/* RECOMMENDATION */
.rec-box{background:var(--ls);border:1px solid rgba(81,115,10,.3);border-radius:14px;padding:16px 18px}
.rec-box h3{font-size:15px;color:var(--ld);margin-bottom:8px}
.rec-box p{font-size:14px;line-height:1.8;color:var(--ink);font-weight:500}

/* ACTION BUTTONS */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--ink);padding:12px 20px;display:flex;gap:10px;justify-content:center;z-index:100;box-shadow:0 -4px 20px rgba(36,18,65,.2)}
.action-bar button{font-family:'Tajawal';font-weight:800;font-size:14px;padding:11px 22px;border-radius:11px;border:none;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.15s}
.btn-pdf{background:var(--plum);color:#fff}.btn-pdf:hover{background:#553098}
.btn-wa{background:#25D366;color:#fff}.btn-wa:hover{background:#1fba58}
.btn-copy{background:rgba(255,255,255,.1);color:#fff}.btn-copy:hover{background:rgba(255,255,255,.2)}

/* PRINT — باسم الوسيط فقط بدون أزرار */
@media print{
  .action-bar,.wa-btn{display:none!important}
  .report{padding-bottom:0!important}
  body{background:#fff}
  .rpt-header{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .score-section,.sec,.verdict,.verdict-box{print-color-adjust:exact;-webkit-print-color-adjust:exact}
  .bar-fill{print-color-adjust:exact;-webkit-print-color-adjust:exact}
}
@media(max-width:600px){.deal-grid{grid-template-columns:1fr}.returns-grid{grid-template-columns:1fr 1fr}.score-row{flex-direction:column}.photos-grid{flex-wrap:wrap}.comp-table td,.comp-table th{padding:8px 9px;font-size:12px}}
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <p>جاري تحميل التقرير...</p>
</div>

<div id="errorPage" class="error-page" style="display:none">
  <div class="error-card">
    <div style="font-size:48px;margin-bottom:14px">🔍</div>
    <h2>التقرير غير موجود</h2>
    <p>رابط التقرير غير صحيح أو انتهت صلاحيته. تواصل مع الوسيط الذي أرسل لك هذا الرابط.</p>
    <a href="https://www.rush-d.net" style="display:inline-block;margin-top:20px;background:var(--plum);color:#fff;padding:12px 24px;border-radius:11px;font-weight:700;font-size:14px">رُشد الرئيسية</a>
  </div>
</div>

<div id="actionBar" class="action-bar" style="display:none">
  <button class="btn-pdf" onclick="downloadPDF()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 15V3m0 12l-4-4m4 4l4-4M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
    تحميل PDF
  </button>
  <button class="btn-wa" id="waShareBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="#fff"><path d="M17.5 14.4c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.5-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6l.4-.5c.1-.2.2-.3.3-.5.1-.2 0-.4-.1-.5-.1-.1-.7-1.7-.9-2.3-.2-.6-.5-.5-.7-.5-.2 0-.4 0-.6 0-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1.1 2.8 1.2 3c.1.2 2.1 3.2 5.1 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.7-.7 2-1.4.2-.6.2-1.2.1-1.4-.2-.1-.4-.2-.7-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.5 1.4 5L2 22l5.2-1.4C8.7 21.5 10.3 22 12 22c5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18c-1.6 0-3.2-.5-4.5-1.3l-.3-.2-3.1.8.9-2.9-.2-.3C3.5 15 3 13.5 3 12 3 7 7 3 12 3s9 4 9 9-4 9-9 9z"/></svg>
    مشاركة واتساب
  </button>
  <button class="btn-copy" onclick="copyLink()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
    نسخ الرابط
  </button>
</div>

<div id="report" class="report" style="display:none;padding-bottom:80px"></div>

<script>
(function(){
var SB="https://hqtdovqreukvprqevazc.supabase.co";
var SK="sb_publishable_Wrm97KpTXBFx0f_wtzo1yA_nTb9YoPz";
var WA="201111066828";

function show(id){
  ['loading','errorPage','report'].forEach(function(x){document.getElementById(x).style.display=x===id?(x==='report'?'block':'flex'):'none';});
  document.getElementById('actionBar').style.display=id==='report'?'flex':'none';
}

function downloadPDF(){
  window.print();
}

function setWaBtn(brokerName,projectName){
  var btn=document.getElementById('waShareBtn');
  if(!btn)return;
  var msg=brokerName?' تقرير من '+brokerName+' — '+projectName+' — ':' تقرير رُشد — ';
  btn.onclick=function(){window.open('https://wa.me/?text='+encodeURIComponent(msg+window.location.href),'_blank');};
}
window.setWaBtn=setWaBtn;
function copyLink(){
  navigator.clipboard.writeText(window.location.href).then(function(){
    var btn=document.querySelector('.btn-copy');
    btn.innerHTML='✅ اتنسخ!';
    setTimeout(function(){btn.innerHTML='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> نسخ الرابط';},2000);
  });
}
window.downloadPDF=downloadPDF;
window.copyLink=copyLink;

function sbG(t,q){
  return fetch(SB+'/rest/v1/'+t+(q?'?'+q:''),{
    headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Accept':'application/json'}
  }).then(function(r){return r.json();});
}

var params=new URLSearchParams(window.location.search);
var id=params.get('id');
if(!id){show('errorPage');return;}

sbG('reports','select=*&id=eq.'+id).then(function(rows){
  if(!rows||!rows[0]){show('errorPage');return;}
  var r=rows[0];
  var d=r.data_json||{};
  var date=new Date(r.created_at).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'});

  if(d.type==='custom_compare'){
    // جيب الصور من localStorage لو موجودة
    try{
      var stored=localStorage.getItem('rushd_rpt_photos_'+r.id);
      if(stored){var ph=JSON.parse(stored);if(d.unitA)d.unitA.photos=ph.A||[];if(d.unitB)d.unitB.photos=ph.B||[];}
    }catch(e){}
    renderCustomCompare(r,d,date);
  } else if(r.type==='comparison'){
    renderComparison(r,d,date);
  } else {
    renderSingle(r,d,date);
  }
  show('report');
}).catch(function(e){console.error(e);show('errorPage');});

/* ── SINGLE REPORT ────────────────────────────────────────────────────────── */
function renderSingle(r,d,date){
  var score=(d.score||0);
  var tColor=score>=90?'#51730A':score>=82?'#6A45C9':score>=70?'#DD8E2A':'#DD4F36';

  var verdictBg=score>=90?'linear-gradient(135deg,#51730A,#7CAF1A)':score>=82?'linear-gradient(135deg,#6A45C9,#9A5BC4)':score>=70?'linear-gradient(135deg,#DD8E2A,#F0A830)':'linear-gradient(135deg,#DD4F36,#E8705A)';

  var bLogo=d.broker_logo?'<img src="'+d.broker_logo+'" style="height:40px;border-radius:9px;background:#fff;padding:4px;object-fit:contain" alt="لوجو">':    '<div style="width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-family:El Messiri;font-weight:700;font-size:18px;color:#fff">'+(d.broker_name||'و').charAt(0)+'</div>';

  var html='<div class="rpt-header">'+
    '<div class="rpt-top">'+
      '<div style="display:flex;align-items:center;gap:10px">'+bLogo+
        '<div><div style="font-family:El Messiri;font-weight:700;font-size:18px;color:#fff">'+(d.broker_name||'')+
        '</div><div style="font-size:12px;color:rgba(255,255,255,.7);font-weight:600">'+(d.broker_company||'')+'</div></div></div>'+
      '<div style="font-size:10px;color:rgba(255,255,255,.4);text-align:left;font-weight:600">تقرير عقاري احترافي<br>تقنية رُشد</div>'+
    '</div>'+
    '<div class="rpt-title">'+(d.project_name||'—')+'</div>'+
    '<div class="rpt-sub">'+date+' · مُعدّ لـ '+(r.client_name||'العميل الكريم')+'</div>'+
  '</div>'+

  '<div class="verdict">'+
    '<div class="verdict-box" style="background:'+verdictBg+'">'+
      '<div class="verdict-text">الحكم: '+(score>=90?'تقدر تدفع وإنت مطمن ✓':score>=82?'خيار قوي يستاهل':score>=70?'كويس مع بعض تحفظات':'خد بالك كويس قبل الدفع')+'</div>'+
      '<div class="verdict-badge">'+tier[0]+'</div>'+
    '</div>'+
  '</div>'+

  '<div class="rpt-body">'+

    '<div class="score-section">'+
      '<div class="score-row">'+
        '<div class="score-gauge">'+
          '<div class="score-num" style="color:'+tColor+'">'+score+'</div>'+
          '<div class="score-label">/ ١٠٠</div>'+
        '</div>'+
        '<div class="score-bars">'+
          bar('التسجيل الرسمي',d.reg_score||0,25,'#6A45C9')+
          bar('سجل التسليم',d.del_score||0,35,'#51730A')+
          bar('الخبرة والحجم',d.exp_score||0,25,'#DD8E2A')+
          bar('الاستقرار',d.stab_score||0,15,'#DD4F36')+
        '</div>'+
      '</div>'+
    '</div>'+

    '<div class="sec">'+
      '<div class="sec-title">📋 تفاصيل الصفقة</div>'+
      '<div class="deal-grid">'+
        ditem('المشروع',d.project_name||'—',true)+
        ditem('المطوّر',d.developer||'—',false)+
        ditem('المساحة',d.size||'—',false)+
        ditem('السعر',d.price||'—',true)+
        ditem('التقسيط',d.installment||'—',false)+
        ditem('التسليم',d.delivery_date||'—',false)+
        ditem('المرافق',d.amenities||'—',false)+
        ditem('العائد المتوقع',d.yield_pct||'—',true)+
      '</div>'+
    '</div>'+

    (d.analysis?'<div class="sec"><div class="sec-title">🤖 تحليل رُشد المحايد</div><div class="analysis-text">'+d.analysis+'</div></div>':'')+

    (d.broker_note?'<div class="sec" style="background:var(--as);border-color:rgba(221,142,42,.3)"><div class="sec-title">📌 ملاحظة من الوسيط</div><div class="analysis-text">'+d.broker_note+'</div></div>':'')+

    imgSection(d.image_urls||[])+

  '</div>'+
  footer(r,d,date);

  document.getElementById('report').innerHTML=html;
  setWaBtn(d.broker_name,d.project_name);
}

/* ── CUSTOM COMPARE ──────────────────────────────────────────────────────── */
function renderCustomCompare(r,d,date){
  var uA=d.unitA||{}, uB=d.unitB||{};
  var fields=d.active_fields||['developer','price','size','delivery','install','down','yield','amenities','strength','warning'];

  var LABELS={developer:'المطوّر',score:'سكور رُشد',price:'السعر',priceM:'سعر المتر',size:'المساحة',delivery:'التسليم',install:'التقسيط',down:'المقدّم',yield:'العائد الإيجاري',amenities:'المرافق',strength:'نقطة القوة',warning:'التحذير'};

  var rows=fields.map(function(key){
    var vA=uA[key]||uA[key+'_pct']||'—';
    var vB=uB[key]||uB[key+'_pct']||'—';
    return '<tr><td style="font-weight:800;background:var(--paper)">'+LABELS[key]+'</td>'+
      '<td class="col-a">'+vA+'</td><td class="col-b">'+vB+'</td></tr>';
  }).join('');

  var bLogoC=d.broker_logo?'<img src="'+d.broker_logo+'" style="height:38px;border-radius:9px;background:#fff;padding:4px;object-fit:contain" alt="لوجو">':'<div style="width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.15);display:grid;place-items:center;font-family:El Messiri;font-weight:700;font-size:16px;color:#fff">'+(d.broker_name||'و').charAt(0)+'</div>';
  var html='<div class="rpt-header">'+
    '<div class="rpt-top">'+
      '<div style="display:flex;align-items:center;gap:10px">'+bLogoC+
        '<div><div style="font-family:El Messiri;font-weight:700;font-size:17px;color:#fff">'+(d.broker_name||'')+
        '</div><div style="font-size:12px;color:rgba(255,255,255,.7);font-weight:600">'+(d.broker_company||'')+'</div></div></div>'+
      '<div style="font-size:10px;color:rgba(255,255,255,.4);text-align:left;font-weight:600">مقارنة حرة<br>تقنية رُشد</div>'+
    '</div>'+
    '<div class="rpt-title">مقارنة: '+(uA.project||'—')+' مقابل '+(uB.project||'—')+'</div>'+
    '<div class="rpt-sub">'+date+' · مُعدّ لـ '+(r.client_name||'العميل الكريم')+'</div>'+
  '</div>'+

  '<div class="rpt-body" style="margin-top:20px">'+

    '<div class="sec">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px">'+
        '<div class="comp-unit-header"><div class="unit-badge" style="background:#6A45C9">أ</div><div><div class="unit-name">'+(uA.project||'الوحدة الأولى')+'</div><div class="unit-dev">'+(uA.developer||'—')+'</div></div></div>'+
        '<div class="comp-unit-header"><div class="unit-badge" style="background:#DD8E2A">ب</div><div><div class="unit-name">'+(uB.project||'الوحدة التانية')+'</div><div class="unit-dev">'+(uB.developer||'—')+'</div></div></div>'+
      '</div>'+
      '<div style="overflow-x:auto"><table class="comp-table">'+
        '<thead><tr><th>البند</th><th style="color:#c9b8f8">'+(uA.project||'أ')+'</th><th style="color:#F0B850">'+(uB.project||'ب')+'</th></tr></thead>'+
        '<tbody>'+rows+'</tbody>'+
      '</table></div>'+
    '</div>'+

    (d.analysis?'<div class="sec rec-box"><h3>💡 توصية رُشد</h3><p>'+d.analysis+'</p></div>':'')+

    // صور الوحدتين
    (function(){
      var pA=(uA.photos||[]).filter(function(p){return p&&p.length>5;}).slice(0,2);
      var pB=(uB.photos||[]).filter(function(p){return p&&p.length>5;}).slice(0,2);
      if(!pA.length&&!pB.length)return '';
      var mkImg=function(url){return '<div class="photo-item"><img src="'+url+'" alt="صورة" onerror="this.parentNode.innerHTML=\'<div class=photo-placeholder>🏙</div>\'"></div>';};
      var secA=pA.length?'<div><div style="font-size:12px;font-weight:700;color:var(--soft);margin-bottom:6px">أ — '+(uA.project||'')+'</div><div class="photos-grid">'+pA.map(mkImg).join('')+'</div></div>':'';
      var secB=pB.length?'<div><div style="font-size:12px;font-weight:700;color:var(--soft);margin-bottom:6px">ب — '+(uB.project||'')+'</div><div class="photos-grid">'+pB.map(mkImg).join('')+'</div></div>':'';
      return '<div class="sec"><div class="sec-title">📷 صور الوحدتين</div><div style="display:flex;flex-direction:column;gap:14px">'+secA+secB+'</div></div>';
    })()+

  '</div>'+
  footer(r,d,date);

  document.getElementById('report').innerHTML=html;
  setWaBtn(d.broker_name,(uA.project||'')+' مقابل '+(uB.project||''));
}

/* ── COMPARISON (from DB projects) ────────────────────────────────────────── */
function renderComparison(r,d,date){
  var projects=d.projects||[];
  var sorted=[...projects].sort(function(a,b){return (b.score||0)-(a.score||0);});
  var medals=['🥇','🥈','🥉'];

  var scoresHtml=sorted.map(function(p,i){
    var sc=p.score||0;
    var c=sc>=90?'#51730A':sc>=82?'#6A45C9':sc>=70?'#DD8E2A':'#DD4F36';
    return '<div style="flex:1;background:var(--paper);border-radius:13px;padding:16px;text-align:center;border:1.5px solid var(--line)">'+
      '<div style="font-size:20px;margin-bottom:6px">'+medals[i]+'</div>'+
      '<div style="font-weight:700;font-size:14px;margin-bottom:4px">'+(p.project||'—')+'</div>'+
      '<div style="font-size:11.5px;color:var(--soft);margin-bottom:10px">'+(p.developer||'—')+'</div>'+
      '<div style="font-family:\'El Messiri\';font-weight:700;font-size:32px;color:'+c+'">'+sc+'</div>'+
      '<div style="font-size:10px;color:var(--soft);font-weight:700">/ ١٠٠</div>'+
    '</div>';
  }).join('');

  var fieldKeys=['developer','price','priceM','size','delivery','install','yield','amenities','strength','warning'];
  var fieldLabels={developer:'المطوّر',price:'السعر',priceM:'سعر المتر',size:'المساحة',delivery:'التسليم',install:'التقسيط',yield:'العائد',amenities:'المرافق',strength:'نقطة القوة',warning:'التحذير'};
  var activeF=d.active_fields||fieldKeys;

  var tableRows=activeF.filter(function(k){return fieldLabels[k];}).map(function(key){
    var cells=sorted.map(function(p){return '<td>'+((p[key]||p[key+'_pct'])||'—')+'</td>';}).join('');
    return '<tr><td style="font-weight:800;background:var(--paper)">'+fieldLabels[key]+'</td>'+cells+'</tr>';
  }).join('');

  var headers=sorted.map(function(p,i){return '<th>'+(medals[i]||'')+(p.project||'—')+'</th>';}).join('');

  var html='<div class="rpt-header">'+
    '<div class="rpt-top">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
        (d.broker_logo?'<img src="'+d.broker_logo+'" style="height:38px;border-radius:9px;background:#fff;padding:4px;object-fit:contain" alt="لوجو">':'')+
        '<div><div style="font-family:El Messiri;font-weight:700;font-size:17px;color:#fff">'+(d.broker_name||'')+
        '</div><div style="font-size:12px;color:rgba(255,255,255,.7);font-weight:600">'+(d.broker_company||'')+'</div></div></div>'+
      '<div style="font-size:10px;color:rgba(255,255,255,.4);text-align:left;font-weight:600">تقرير مقارنة<br>تقنية رُشد</div>'+
    '</div>'+
    '<div class="rpt-title">مقارنة '+(sorted.length)+' مشاريع</div>'+
    '<div class="rpt-sub">'+date+' · مُعدّ لـ '+(r.client_name||'العميل الكريم')+'</div>'+
  '</div>'+

  '<div class="rpt-body" style="margin-top:20px">'+
    '<div class="sec">'+
      '<div class="sec-title">🏅 ترتيب المشاريع</div>'+
      '<div style="display:flex;gap:10px">'+scoresHtml+'</div>'+
    '</div>'+
    '<div class="sec">'+
      '<div class="sec-title">📊 مقارنة تفصيلية</div>'+
      '<div style="overflow-x:auto"><table class="comp-table">'+
        '<thead><tr><th>البند</th>'+headers+'</tr></thead>'+
        '<tbody>'+tableRows+'</tbody>'+
      '</table></div>'+
    '</div>'+
  '</div>'+
  footer(r,d,date);

  document.getElementById('report').innerHTML=html;
}

/* ── HELPERS ────────────────────────────────────────────────────────────── */
function bar(label,val,max,color){
  var pct=Math.min(100,Math.round((val/max)*100));
  return '<div class="bar-row">'+
    '<div class="bar-label">'+label+'</div>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
    '<div class="bar-val">'+val+'/'+max+'</div>'+
  '</div>';
}

function ditem(label,val,hl){
  return '<div class="deal-item'+(hl?' highlight':'')+'">'+
    '<div class="dl">'+label+'</div>'+
    '<div class="dv">'+val+'</div>'+
  '</div>';
}

function imgSection(imgs){
  if(!imgs||!imgs.length)return '';
  var validImgs=imgs.filter(function(u){return u&&u.length>5;}).slice(0,3);
  if(!validImgs.length)return '';
  var items=validImgs.map(function(u){
    return '<div class="photo-item"><img src="'+u+'" alt="صورة المشروع" onerror="this.parentNode.innerHTML=\'<div class=photo-placeholder>🏙</div>\'"></div>';
  }).join('');
  return '<div class="sec"><div class="sec-title">📷 صور المشروع</div><div class="photos-grid">'+items+'</div></div>';
}

function footer(r,d,date){
  var bName=d.broker_name||'';
  var bCo=d.broker_company||'';
  return '<div class="rpt-footer">'+
    '<div class="fl">'+(bName?bName+' · ':'')+bCo+'<br>'+date+' · تقرير استرشادي غير ملزم</div>'+
  '</div>';
}

})();
</script>
</body>
</html>
